spring:
  application:
    name: task-manager-api

  main:
    allow-circular-references: true

  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager
    username: taskuser
    password: taskpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: SEU_MAILTRAP_USER
    password: SEU_MAILTRAP_PASS
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: "TaskManagerSecretKeyMuitoLongaESegura1234567890ABCDEF"
    expiration: 3600000
    refresh-expiration: 604800000
  mail:
    from: "noreply@taskmanager.com"
    notify-hours-before: 24

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

logging:
  level:
    com.taskmanager: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.web: TRACE